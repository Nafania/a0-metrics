<html>

<head>
    <title>Metrics Dashboard</title>
    <script type="module">
        import { store } from "/plugins/metrics/webui/modals/metrics/metrics-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.metricsDashboard">
            <div x-create="$store.metricsDashboard.onOpen()" x-destroy="$store.metricsDashboard.cleanup()"
                class="metrics-dashboard">

                <!-- Tabs -->
                <div class="m-tabs">
                    <template x-for="t in [
                        {id:'overview', icon:'dashboard', label:'Overview'},
                        {id:'performance', icon:'speed', label:'Performance'},
                        {id:'usage_type', icon:'category', label:'Usage Type'},
                        {id:'projects', icon:'snippet_folder', label:'By Project'},
                        {id:'feed', icon:'list_alt', label:'Live Feed'},
                    ]" :key="t.id">
                        <button class="m-tab" :class="{ active: $store.metricsDashboard.activeTab === t.id }"
                            @click="$store.metricsDashboard.switchTab(t.id)">
                            <span class="material-symbols-outlined" x-text="t.icon"></span>
                            <span class="m-tab-label" x-text="t.label"></span>
                        </button>
                    </template>
                    <div class="m-tabs-right">
                        <span class="m-uptime" x-show="$store.metricsDashboard.uptimeSeconds > 0">
                            <span x-text="$store.metricsDashboard.fmtUptime($store.metricsDashboard.uptimeSeconds)"></span>
                        </span>
                        <div class="m-range-control" @click.outside="$store.metricsDashboard.rangePickerOpen = false">
                            <button class="m-range-btn" @click="$store.metricsDashboard.toggleRangePicker()">
                                <span class="material-symbols-outlined">schedule</span>
                                <span x-text="$store.metricsDashboard.rangeLabel()"></span>
                                <span class="material-symbols-outlined">expand_more</span>
                            </button>
                            <div class="m-range-popover" x-show="$store.metricsDashboard.rangePickerOpen">
                                <div class="m-range-row">
                                    <label class="m-filter-field">
                                        <span>From</span>
                                        <input type="datetime-local" x-model="$store.metricsDashboard.fromDateTime" />
                                    </label>
                                    <label class="m-filter-field">
                                        <span>To</span>
                                        <input type="datetime-local" x-model="$store.metricsDashboard.toDateTime" />
                                    </label>
                                </div>
                                <label class="m-filter-field">
                                    <span>Bucket</span>
                                    <select x-model="$store.metricsDashboard.bucket">
                                        <option value="hour">Hour</option>
                                        <option value="day">Day</option>
                                    </select>
                                </label>
                                <div class="m-range-actions">
                                    <button class="m-range-secondary" @click="$store.metricsDashboard.resetRange()">Last 24h</button>
                                    <button class="m-range-primary" @click="$store.metricsDashboard.applyFilters()">Apply</button>
                                </div>
                            </div>
                        </div>
                        <span class="m-filter-meta" x-show="$store.metricsDashboard.bufferSize > 0">
                            <span x-text="$store.metricsDashboard.filteredCount"></span>/<span x-text="$store.metricsDashboard.bufferSize"></span>
                        </span>
                    </div>
                </div>

                <!-- States -->
                <div x-show="$store.metricsDashboard.loading && $store.metricsDashboard.totalCalls === 0" class="m-empty">Loading...</div>
                <div x-show="$store.metricsDashboard.error" class="m-error" x-text="$store.metricsDashboard.error"></div>
                <div x-show="!$store.metricsDashboard.loading && $store.metricsDashboard.totalCalls === 0 && !$store.metricsDashboard.error" class="m-empty">
                    <span class="material-symbols-outlined" style="font-size:48px;opacity:0.3">monitoring</span>
                    <p>No metrics in selected range.</p>
                </div>

                <!-- ═══════ OVERVIEW ═══════ -->
                <div x-show="$store.metricsDashboard.activeTab === 'overview' && $store.metricsDashboard.totalCalls > 0" class="m-content">
                    <div class="kpi-grid">
                        <div class="kpi-card kpi-accent">
                            <div class="kpi-icon"><span class="material-symbols-outlined">token</span></div>
                            <div class="kpi-label">Tokens In</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtNum($store.metricsDashboard.totalTokensIn)"></div>
                            <div class="kpi-sub">avg <span x-text="$store.metricsDashboard.avgTokensInPerCall()"></span> in/req</div>
                        </div>
                        <div class="kpi-card kpi-accent">
                            <div class="kpi-icon"><span class="material-symbols-outlined">output</span></div>
                            <div class="kpi-label">Tokens Out</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtNum($store.metricsDashboard.totalTokensOut)"></div>
                            <div class="kpi-sub">avg <span x-text="$store.metricsDashboard.avgTokensOutPerCall()"></span> out/req</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><span class="material-symbols-outlined">counter_1</span></div>
                            <div class="kpi-label">Requests</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.totalCalls"></div>
                            <div class="kpi-sub">
                                <span x-text="$store.metricsDashboard.successCalls"></span> ok ·
                                <span x-text="$store.metricsDashboard.failedCalls"></span> err
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><span class="material-symbols-outlined">timer</span></div>
                            <div class="kpi-label">Avg TTFT</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtLatency($store.metricsDashboard.avgTtft)"></div>
                            <div class="kpi-sub">p95 = <span x-text="$store.metricsDashboard.fmtLatency($store.metricsDashboard.p95Ttft)"></span></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><span class="material-symbols-outlined">arrow_upward</span></div>
                            <div class="kpi-label">Prompt Tok/s</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtTps($store.metricsDashboard.avgPromptTps)"></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><span class="material-symbols-outlined">arrow_downward</span></div>
                            <div class="kpi-label">Response Tok/s</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtTps($store.metricsDashboard.avgResponseTps)"></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon"><span class="material-symbols-outlined">check_circle</span></div>
                            <div class="kpi-label">Success Rate</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.successRate()"></div>
                        </div>
                    </div>

                    <!-- Timeline -->
                    <div class="m-section" x-show="($store.metricsDashboard.timeline || []).length > 1">
                        <h3 x-text="$store.metricsDashboard.activityTitle()"></h3>
                        <div class="sparkline-box">
                            <svg viewBox="0 0 600 80" preserveAspectRatio="none" class="sparkline-svg">
                                <path :d="$store.metricsDashboard.sparklinePath($store.metricsDashboard.timeline, 'calls', 600, 70)"
                                    fill="none" stroke="var(--color-accent, #60a5fa)" stroke-width="2" />
                                <path :d="$store.metricsDashboard.sparklinePath($store.metricsDashboard.timeline, 'errors', 600, 70)"
                                    fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" />
                            </svg>
                            <div class="sparkline-legend">
                                <span><span class="leg-line accent"></span> Calls</span>
                                <span><span class="leg-line error"></span> Errors</span>
                            </div>
                        </div>
                    </div>

                    <!-- Top models mini table -->
                    <div class="m-section" x-show="($store.metricsDashboard.byModel || []).length > 0">
                        <h3>Top Models</h3>
                        <div class="mini-table-wrap">
                            <table class="mini-table">
                                <thead><tr><th>Model</th><th>Calls</th><th>Tokens In</th><th>Tokens Out</th><th>Avg Latency</th></tr></thead>
                                <tbody>
                                    <template x-for="(m, midx) in ($store.metricsDashboard.byModel || []).slice(0, 5)" :key="m.name || midx">
                                        <tr>
                                            <td class="cell-name" x-text="m.name"></td>
                                            <td x-text="m.calls"></td>
                                            <td x-text="$store.metricsDashboard.fmtNum(m.tokens_in)"></td>
                                            <td x-text="$store.metricsDashboard.fmtNum(m.tokens_out)"></td>
                                            <td x-text="$store.metricsDashboard.fmtLatency(m.avg_latency_ms)"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Recent errors -->
                    <div class="m-section" x-show="($store.metricsDashboard.recentErrors || []).length > 0">
                        <h3>Recent Errors</h3>
                        <div class="errors-list">
                            <template x-for="(err, eidx) in ($store.metricsDashboard.recentErrors || []).slice(0, 5)" :key="eidx">
                                <div class="err-item">
                                    <span class="err-model" x-text="err.model"></span>
                                    <span class="err-msg" x-text="err.error"></span>
                                    <span class="err-time" x-text="$store.metricsDashboard.fmtTime(err.timestamp)"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- ═══════ PERFORMANCE ═══════ -->
                <div x-show="$store.metricsDashboard.activeTab === 'performance' && $store.metricsDashboard.totalCalls > 0" class="m-content">
                    <div class="kpi-grid kpi-4">
                        <template x-for="p in [
                            {label:'P50 Latency', val:$store.metricsDashboard.p50Latency},
                            {label:'P95 Latency', val:$store.metricsDashboard.p95Latency},
                            {label:'P99 Latency', val:$store.metricsDashboard.p99Latency},
                            {label:'Avg Latency', val:$store.metricsDashboard.avgLatency},
                        ]" :key="p.label">
                            <div class="kpi-card">
                                <div class="kpi-label" x-text="p.label"></div>
                                <div class="kpi-value kpi-lg" x-text="$store.metricsDashboard.fmtLatency(p.val)"></div>
                            </div>
                        </template>
                    </div>

                    <div class="m-section" x-show="($store.metricsDashboard.byModel || []).length > 0">
                        <h3>Latency by Model</h3>
                        <div class="bar-rows">
                            <template x-for="m in ($store.metricsDashboard.byModel || [])" :key="m.name">
                                <div class="bar-row">
                                    <span class="bar-name" x-text="m.name"></span>
                                    <div class="bar-track">
                                        <div class="bar-fill" :style="'width:' + (m.avg_latency_ms / $store.metricsDashboard.maxOf($store.metricsDashboard.byModel, 'avg_latency_ms') * 100) + '%'"></div>
                                    </div>
                                    <span class="bar-val" x-text="$store.metricsDashboard.fmtLatency(m.avg_latency_ms)"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="m-section" x-show="($store.metricsDashboard.byModel || []).length > 0">
                        <h3>TTFT by Model</h3>
                        <div class="bar-rows">
                            <template x-for="m in ($store.metricsDashboard.byModel || []).filter(x => x.avg_ttft_ms > 0)" :key="m.name">
                                <div class="bar-row">
                                    <span class="bar-name" x-text="m.name"></span>
                                    <div class="bar-track">
                                        <div class="bar-fill bar-fill-ttft" :style="'width:' + (m.avg_ttft_ms / $store.metricsDashboard.maxOf($store.metricsDashboard.byModel, 'avg_ttft_ms') * 100) + '%'"></div>
                                    </div>
                                    <span class="bar-val" x-text="$store.metricsDashboard.fmtLatency(m.avg_ttft_ms)"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- ═══════ USAGE TYPE ═══════ -->
                <div x-show="$store.metricsDashboard.activeTab === 'usage_type' && $store.metricsDashboard.totalCalls > 0" class="m-content">
                    <div class="agg-table-wrap">
                        <table class="agg-table">
                            <thead><tr><th>Usage Type</th><th>Calls</th><th>OK</th><th>Err</th><th>Tokens In</th><th>Tokens Out</th><th>Avg Latency</th><th>Retries</th></tr></thead>
                            <tbody>
                                <template x-for="r in ($store.metricsDashboard.byUsageType || [])" :key="r.name">
                                    <tr>
                                        <td class="cell-name" x-text="r.name"></td>
                                        <td x-text="r.calls"></td>
                                        <td class="cell-ok" x-text="r.success"></td>
                                        <td class="cell-err" x-text="r.failed"></td>
                                        <td x-text="$store.metricsDashboard.fmtNum(r.tokens_in)"></td>
                                        <td x-text="$store.metricsDashboard.fmtNum(r.tokens_out)"></td>
                                        <td x-text="$store.metricsDashboard.fmtLatency(r.avg_latency_ms)"></td>
                                        <td x-text="r.retries"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <div class="m-section" x-show="($store.metricsDashboard.byUsageType || []).length > 0">
                        <h3>Token Split by Usage Type</h3>
                        <div class="bar-rows">
                            <template x-for="r in ($store.metricsDashboard.byUsageType || [])" :key="r.name">
                                <div class="bar-row">
                                    <span class="bar-name" x-text="r.name"></span>
                                    <div class="bar-track token-split-track">
                                        <div class="bar-fill bar-fill-in" :style="'width:' + ((r.tokens_in || 0) / $store.metricsDashboard.maxTokenSplit($store.metricsDashboard.byUsageType || []) * 100) + '%'"></div>
                                        <div class="bar-fill bar-fill-out" :style="'width:' + ((r.tokens_out || 0) / $store.metricsDashboard.maxTokenSplit($store.metricsDashboard.byUsageType || []) * 100) + '%'"></div>
                                    </div>
                                    <span class="bar-val bar-val-wide" x-text="$store.metricsDashboard.fmtNum(r.tokens_in) + ' / ' + $store.metricsDashboard.fmtNum(r.tokens_out)"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- ═══════ BY PROJECT ═══════ -->
                <div x-show="$store.metricsDashboard.activeTab === 'projects' && $store.metricsDashboard.totalCalls > 0" class="m-content">
                    <template x-for="proj in ($store.metricsDashboard.byProject || [])" :key="proj.name">
                        <div class="proj-card">
                            <div class="proj-header" @click="$store.metricsDashboard.toggleProject(proj.name)">
                                <span class="material-symbols-outlined proj-chevron"
                                    :class="{ rotated: $store.metricsDashboard.isProjectExpanded(proj.name) }">chevron_right</span>
                                <span class="proj-name" x-text="proj.name"></span>
                                <div class="proj-stats">
                                    <span x-text="proj.calls + ' calls'"></span>
                                    <span>·</span>
                                    <span x-text="$store.metricsDashboard.fmtNum(proj.tokens_in) + ' in / ' + $store.metricsDashboard.fmtNum(proj.tokens_out) + ' out'"></span>
                                    <span>·</span>
                                    <span x-text="$store.metricsDashboard.fmtLatency(proj.avg_latency_ms) + ' avg'"></span>
                                    <span>·</span>
                                    <span x-text="proj.chats.length + ' chat(s)'"></span>
                                </div>
                            </div>
                            <div x-show="$store.metricsDashboard.isProjectExpanded(proj.name)" class="proj-chats">
                                <table class="agg-table agg-table-sm">
                                    <thead><tr><th>Chat</th><th>Calls</th><th>Tokens In</th><th>Tokens Out</th></tr></thead>
                                    <tbody>
                                        <template x-for="ch in proj.chats" :key="ch.context_id">
                                            <tr>
                                                <td class="cell-name" x-text="ch.name || ch.context_id"></td>
                                                <td x-text="ch.calls"></td>
                                                <td x-text="$store.metricsDashboard.fmtNum(ch.tokens_in)"></td>
                                                <td x-text="$store.metricsDashboard.fmtNum(ch.tokens_out)"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- ═══════ LIVE FEED ═══════ -->
                <div x-show="$store.metricsDashboard.activeTab === 'feed' && $store.metricsDashboard.totalCalls > 0" class="m-content">
                    <div class="feed-list">
                        <template x-for="(ev, idx) in ($store.metricsDashboard.recentEvents || [])" :key="idx">
                            <div class="feed-item" :class="{ 'feed-err': !ev.success }">
                                <span class="feed-icon">
                                    <span class="material-symbols-outlined" x-text="ev.success ? 'check_circle' : 'error'"
                                        :style="'color:' + (ev.success ? 'var(--color-ok,#22c55e)' : '#ef4444') + ';font-size:16px'"></span>
                                </span>
                                <span class="feed-model" x-text="ev.model"></span>
                                <span class="feed-badge" x-text="ev.usage_type || '?'" :title="'Agent: ' + (ev.agent_name || '?')"></span>
                                <span class="feed-tokens" x-text="$store.metricsDashboard.fmtNum(ev.tokens_in) + '→' + $store.metricsDashboard.fmtNum(ev.tokens_out)"></span>
                                <span class="feed-latency" x-text="$store.metricsDashboard.fmtLatency(ev.latency_ms)"></span>
                                <span class="feed-ttft" x-show="ev.ttft_ms" x-text="'TTFT ' + $store.metricsDashboard.fmtLatency(ev.ttft_ms || 0)"></span>
                                <span class="feed-retry" x-show="ev.attempts > 1" x-text="'×' + ev.attempts"></span>
                                <span class="feed-time" x-text="$store.metricsDashboard.fmtTime(ev.timestamp)"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>

<style>
    .metrics-dashboard { display:flex; flex-direction:column; gap:var(--spacing-md,16px); min-height:400px; }

    /* Tabs */
    .m-tabs { display:flex; gap:2px; border-bottom:1px solid var(--color-border,#333); padding-bottom:8px; flex-wrap:wrap; align-items:center; }
    .m-tab { display:flex; align-items:center; gap:5px; padding:6px 12px; border:none; background:transparent; color:var(--color-text-secondary,#888); cursor:pointer; border-radius:6px 6px 0 0; font-size:12px; transition:all .15s; white-space:nowrap; }
    .m-tab .material-symbols-outlined { font-size:16px; }
    .m-tab:hover { background:var(--color-background-hover,#222); color:var(--color-text,#eee); }
    .m-tab.active { background:var(--color-panel,#1a1a2e); color:var(--color-text,#eee); border-bottom:2px solid var(--color-accent,#60a5fa); }
    .m-tab-label { }
    .m-tabs-right { margin-left:auto; display:flex; align-items:center; gap:6px; font-size:11px; color:var(--color-text-secondary,#888); flex-wrap:wrap; justify-content:flex-end; }
    .m-uptime { opacity:0.7; }

    /* Filters */
    .m-range-control { position:relative; }
    .m-range-btn { height:30px; display:flex; align-items:center; gap:5px; padding:3px 9px; border:1px solid var(--color-border,#333); border-radius:6px; background:var(--color-panel,#1a1a2e); color:var(--color-text,#eee); font-size:11px; cursor:pointer; white-space:nowrap; }
    .m-range-btn .material-symbols-outlined { font-size:15px; }
    .m-range-btn:hover { background:var(--color-background-hover,#222); }
    .m-range-popover { position:absolute; top:36px; right:0; z-index:50; width:360px; display:flex; flex-direction:column; gap:10px; padding:12px; background:var(--color-panel,#1a1a2e); border:1px solid var(--color-border,#333); border-radius:10px; }
    .m-range-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .m-filter-field { display:flex; flex-direction:column; gap:4px; font-size:9px; text-transform:uppercase; letter-spacing:.04em; color:var(--color-text-secondary,#888); }
    .m-filter-field input, .m-filter-field select { width:100%; height:30px; padding:3px 7px; border:1px solid var(--color-border,#333); border-radius:6px; background:var(--color-background,#111); color:var(--color-text,#eee); font-size:12px; text-transform:none; letter-spacing:normal; }
    .m-range-actions { display:flex; justify-content:flex-end; gap:8px; }
    .m-range-primary, .m-range-secondary { height:30px; padding:3px 10px; border-radius:6px; font-size:12px; cursor:pointer; }
    .m-range-primary { border:1px solid var(--color-highlight,#2563eb); background:var(--color-highlight,#2563eb); color:#fff; }
    .m-range-secondary { border:1px solid var(--color-border,#333); background:transparent; color:var(--color-text,#eee); }
    .m-filter-meta { font-size:10px; color:var(--color-text-secondary,#888); white-space:nowrap; }

    /* States */
    .m-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:60px 20px; color:var(--color-text-secondary,#888); text-align:center; }
    .m-error { padding:10px 14px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); border-radius:8px; color:#ef4444; font-size:13px; }
    .m-content { }
    .m-section { margin-top:16px; }
    .m-section h3 { font-size:13px; font-weight:600; color:var(--color-text,#eee); margin-bottom:8px; text-transform:uppercase; letter-spacing:.04em; }

    /* KPI Grid */
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
    .kpi-4 { grid-template-columns:repeat(4,1fr); }
    .kpi-card { background:var(--color-panel,#1a1a2e); border:1px solid var(--color-border,#333); border-radius:10px; padding:14px 16px; position:relative; }
    .kpi-accent { border-left:3px solid var(--color-accent,#60a5fa); }
    .kpi-icon { position:absolute; top:10px; right:12px; opacity:.2; }
    .kpi-icon .material-symbols-outlined { font-size:22px; }
    .kpi-label { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--color-text-secondary,#888); margin-bottom:4px; }
    .kpi-value { font-size:24px; font-weight:700; color:var(--color-text,#eee); line-height:1.2; }
    .kpi-lg { font-size:30px; }
    .kpi-sub { font-size:11px; margin-top:3px; color:var(--color-text-secondary,#888); }

    /* Sparkline */
    .sparkline-box { background:var(--color-panel,#1a1a2e); border:1px solid var(--color-border,#333); border-radius:10px; padding:12px 14px 6px; }
    .sparkline-svg { width:100%; height:70px; }
    .sparkline-legend { display:flex; gap:14px; font-size:11px; color:var(--color-text-secondary,#888); padding-top:4px; }
    .leg-line { display:inline-block; width:16px; height:2px; vertical-align:middle; margin-right:3px; }
    .leg-line.accent { background:var(--color-accent,#60a5fa); }
    .leg-line.error { background:#ef4444; }

    /* Bar rows */
    .bar-rows { display:flex; flex-direction:column; gap:6px; }
    .bar-row { display:flex; align-items:center; gap:8px; font-size:12px; }
    .bar-name { width:180px; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--color-text,#eee); flex-shrink:0; }
    .bar-track { flex:1; height:8px; background:var(--color-border,#333); border-radius:4px; overflow:hidden; }
